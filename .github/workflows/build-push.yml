name: Build and Push Images to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'container-images/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: petfaindr6acr
  ACR_LOGIN_SERVER: petfaindr6acr.azurecr.io

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag from Git SHA
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./container-images/backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/petb:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/petb:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./container-images/frontend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/petf:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/petf:latest

      - name: Build summary
        run: |
          echo "### Images Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.ACR_LOGIN_SERVER }}/petb:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.ACR_LOGIN_SERVER }}/petf:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
